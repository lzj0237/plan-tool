<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlanPilot - 任务管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-size: 24px; color: #1a1a1a; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-name { font-size: 14px; color: #666; }
        .logout-btn { padding: 6px 12px; background: #fff; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .logout-btn:hover { background: #f0f0f0; }
        
        /* Auth Card */
        .auth-card { background: #fff; border-radius: 8px; padding: 40px; max-width: 400px; margin: 100px auto; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .auth-card h2 { margin-bottom: 20px; text-align: center; }
        .auth-tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid #eee; }
        .auth-tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; border-bottom: 2px solid transparent; }
        .auth-tab.active { border-bottom-color: #007bff; color: #007bff; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 14px; color: #666; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .form-group input:focus { outline: none; border-color: #007bff; }
        .submit-btn { width: 100%; padding: 12px; background: #007bff; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .submit-btn:hover { background: #0056b3; }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; }
        
        .hidden { display: none !important; }
        
        /* Task Input */
        .task-input-section { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .task-input-section h3 { margin-bottom: 15px; font-size: 16px; }
        .task-form { display: flex; gap: 10px; flex-wrap: wrap; }
        .task-form input[type="text"] { flex: 1; min-width: 200px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .task-form input[type="date"] { padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .add-btn { padding: 10px 20px; background: #28a745; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .add-btn:hover { background: #218838; }
        
        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #fff; border-radius: 8px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stat-card .number { font-size: 32px; font-weight: bold; color: #007bff; }
        .stat-card .label { font-size: 12px; color: #666; margin-top: 5px; }
        .stat-card.done .number { color: #28a745; }
        .stat-card.running .number { color: #ffc107; }
        .stat-card.planned .number { color: #6c757d; }
        
        /* Task List */
        .task-list { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .task-list-header { padding: 15px 20px; border-bottom: 1px solid #eee; font-weight: 500; }
        .task-item { display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid #f5f5f5; }
        .task-item:last-child { border-bottom: none; }
        .task-status { width: 8px; height: 8px; border-radius: 50%; margin-right: 12px; }
        .task-status.done { background: #28a745; }
        .task-status.running { background: #ffc107; }
        .task-status.planned { background: #6c757d; }
        .task-status.paused { background: #dc3545; }
        .task-info { flex: 1; }
        .task-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
        .task-meta { font-size: 12px; color: #999; }
        .task-actions { display: flex; gap: 8px; }
        .task-btn { padding: 6px 12px; border: 1px solid #ddd; background: #fff; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .task-btn:hover { background: #f5f5f5; }
        .task-btn.start { background: #28a745; color: #fff; border-color: #28a745; }
        .task-btn.start:hover { background: #218838; }
        .task-btn.pause { background: #ffc107; color: #fff; border-color: #ffc107; }
        .task-btn.pause:hover { background: #e0a800; }
        .task-btn.stop { background: #dc3545; color: #fff; border-color: #dc3545; }
        .task-btn.stop:hover { background: #c82333; }
        .task-btn.delete { color: #dc3545; }
        .task-btn.delete:hover { background: #dc3545; color: #fff; }
        
        /* Empty State */
        .empty-state { text-align: center; padding: 40px; color: #999; }
        .empty-state p { margin-bottom: 10px; }
        
        /* Message */
        .message { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 4px; font-size: 14px; z-index: 1000; }
        .message.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .message.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        
        /* Loading */
        .loading { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <div id="message" class="message hidden"></div>
    
    <!-- Auth View -->
    <div id="authView" class="auth-card">
        <h2>PlanPilot</h2>
        <div class="auth-tabs">
            <div class="auth-tab active" data-tab="login">登录</div>
            <div class="auth-tab" data-tab="register">注册</div>
        </div>
        
        <!-- Login Form -->
        <form id="loginForm">
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" name="email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" required placeholder="输入密码">
            </div>
            <button type="submit" class="submit-btn">登录</button>
        </form>
        
        <!-- Register Form -->
        <form id="registerForm" class="hidden">
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" name="email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" required minlength="6" placeholder="至少6位密码">
            </div>
            <div class="form-group">
                <label>名称</label>
                <input type="text" name="full_name" required placeholder="你的名字">
            </div>
            <button type="submit" class="submit-btn">注册</button>
        </form>
    </div>
    
    <!-- Main View -->
    <div id="mainView" class="container hidden">
        <div class="header">
            <h1>PlanPilot</h1>
            <div class="user-info">
                <span class="user-name" id="userName"></span>
                <button class="logout-btn" onclick="logout()">退出</button>
            </div>
        </div>
        
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="number" id="statTotal">0</div>
                <div class="label">总任务</div>
            </div>
            <div class="stat-card done">
                <div class="number" id="statDone">0</div>
                <div class="label">已完成</div>
            </div>
            <div class="stat-card running">
                <div class="number" id="statRunning">0</div>
                <div class="label">进行中</div>
            </div>
            <div class="stat-card planned">
                <div class="number" id="statPlanned">0</div>
                <div class="label">待开始</div>
            </div>
        </div>
        
        <!-- Task Input -->
        <div class="task-input-section">
            <h3>添加新任务</h3>
            <div class="task-form">
                <input type="text" id="taskTitle" placeholder="输入任务名称...">
                <input type="date" id="taskDate">
                <button class="add-btn" onclick="createTask()">添加</button>
            </div>
        </div>
        
        <!-- Task List -->
        <div class="task-list">
            <div class="task-list-header">任务列表</div>
            <div id="taskListContent">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>
    
    <script>
        // Config
        const API_BASE = 'http://localhost:8000';
        
        // State
        let token = localStorage.getItem('token');
        let user = JSON.parse(localStorage.getItem('user') || 'null');
        
        // DOM
        const authView = document.getElementById('authView');
        const mainView = document.getElementById('mainView');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const messageEl = document.getElementById('message');
        
        // Init
        init();
        
        function init() {
            if (token && user) {
                showMainView();
                loadTasks();
            } else {
                showAuthView();
            }
        }
        
        function showMessage(text, type = 'success') {
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            messageEl.classList.remove('hidden');
            setTimeout(() => messageEl.classList.add('hidden'), 3000);
        }
        
        function showAuthView() {
            authView.classList.remove('hidden');
            mainView.classList.add('hidden');
        }
        
        function showMainView() {
            authView.classList.add('hidden');
            mainView.classList.remove('hidden');
            document.getElementById('userName').textContent = user.full_name;
        }
        
        // Tab switching
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                if (tab.dataset.tab === 'login') {
                    loginForm.classList.remove('hidden');
                    registerForm.classList.add('hidden');
                } else {
                    loginForm.classList.add('hidden');
                    registerForm.classList.remove('hidden');
                }
            });
        });
        
        // Login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(loginForm);
            
            try {
                const res = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: formData.get('email'),
                        password: formData.get('password')
                    })
                });
                
                const data = await res.json();
                
                if (!res.ok) throw new Error(data.detail || '登录失败');
                
                token = data.access_token;
                user = { id: data.user_id, tenant_id: data.tenant_id, full_name: data.full_name, role: data.role };
                
                localStorage.setItem('token', token);
                localStorage.setItem('user', JSON.stringify(user));
                
                showMainView();
                loadTasks();
                showMessage('登录成功');
            } catch (err) {
                showMessage(err.message, 'error');
            }
        });
        
        // Register
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(registerForm);
            
            try {
                const res = await fetch(`${API_BASE}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: formData.get('email'),
                        password: formData.get('password'),
                        full_name: formData.get('full_name')
                    })
                });
                
                const data = await res.json();
                
                if (!res.ok) throw new Error(data.detail || '注册失败');
                
                showMessage('注册成功，请登录');
                document.querySelector('.auth-tab[data-tab="login"]').click();
            } catch (err) {
                showMessage(err.message, 'error');
            }
        });
        
        // Logout
        function logout() {
            token = null;
            user = null;
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            showAuthView();
            showMessage('已退出登录');
        }
        
        // Load tasks
        async function loadTasks() {
            try {
                const res = await fetch(`${API_BASE}/api/tasks`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.status === 401) {
                    logout();
                    showMessage('登录已过期', 'error');
                    return;
                }
                
                const tasks = await res.json();
                renderTasks(tasks);
                updateStats(tasks);
            } catch (err) {
                showMessage('加载任务失败', 'error');
            }
        }
        
        // Render tasks
        function renderTasks(tasks) {
            const container = document.getElementById('taskListContent');
            
            if (tasks.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>暂无任务</p><p>添加一个新任务开始吧</p></div>';
                return;
            }
            
            container.innerHTML = tasks.map(task => {
                const statusLabels = {
                    done: '已完成',
                    running: '进行中',
                    paused: '已暂停',
                    planned: '待开始'
                };
                
                let actionBtn = '';
                if (task.status === 'planned') {
                    actionBtn = `<button class="task-btn start" onclick="startTask(${task.id})">开始</button>`;
                } else if (task.status === 'running') {
                    actionBtn = `
                        <button class="task-btn pause" onclick="pauseTask(${task.id})">暂停</button>
                        <button class="task-btn stop" onclick="stopTask(${task.id})">完成</button>
                    `;
                } else if (task.status === 'paused') {
                    actionBtn = `
                        <button class="task-btn start" onclick="startTask(${task.id})">继续</button>
                        <button class="task-btn stop" onclick="stopTask(${task.id})">完成</button>
                    `;
                }
                
                return `
                    <div class="task-item">
                        <div class="task-status ${task.status}"></div>
                        <div class="task-info">
                            <div class="task-title">${task.title}</div>
                            <div class="task-meta">
                                ${statusLabels[task.status]} 
                                ${task.planned_date ? ` | 计划: ${task.planned_date}` : ''}
                                ${task.total_minutes > 0 ? ` | 用时: ${task.total_minutes}分钟` : ''}
                            </div>
                        </div>
                        <div class="task-actions">
                            ${actionBtn}
                            <button class="task-btn delete" onclick="deleteTask(${task.id})">删除</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Update stats
        function updateStats(tasks) {
            document.getElementById('statTotal').textContent = tasks.length;
            document.getElementById('statDone').textContent = tasks.filter(t => t.status === 'done').length;
            document.getElementById('statRunning').textContent = tasks.filter(t => t.status === 'running').length;
            document.getElementById('statPlanned').textContent = tasks.filter(t => t.status === 'planned' || t.status === 'paused').length;
        }
        
        // Create task
        async function createTask() {
            const titleInput = document.getElementById('taskTitle');
            const dateInput = document.getElementById('taskDate');
            
            const title = titleInput.value.trim();
            if (!title) {
                showMessage('请输入任务名称', 'error');
                return;
            }
            
            try {
                const body = { title };
                if (dateInput.value) {
                    body.planned_date = dateInput.value;
                }
                
                const res = await fetch(`${API_BASE}/api/tasks`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(body)
                });
                
                if (!res.ok) throw new Error('创建失败');
                
                titleInput.value = '';
                dateInput.value = '';
                loadTasks();
                showMessage('任务已创建');
            } catch (err) {
                showMessage(err.message, 'error');
            }
        }
        
        // Task actions
        async function startTask(id) {
            try {
                const res = await fetch(`${API_BASE}/api/tasks/${id}/start`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('操作失败');
                loadTasks();
            } catch (err) {
                showMessage(err.message, 'error');
            }
        }
        
        async function pauseTask(id) {
            try {
                const res = await fetch(`${API_BASE}/api/tasks/${id}/pause`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('操作失败');
                loadTasks();
            } catch (err) {
                showMessage(err.message, 'error');
            }
        }
        
        async function stopTask(id) {
            try {
                const res = await fetch(`${API_BASE}/api/tasks/${id}/stop`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('操作失败');
                loadTasks();
            } catch (err) {
                showMessage(err.message, 'error');
            }
        }
        
        async function deleteTask(id) {
            if (!confirm('确定删除这个任务？')) return;
            
            try {
                const res = await fetch(`${API_BASE}/api/tasks/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('删除失败');
                loadTasks();
                showMessage('任务已删除');
            } catch (err) {
                showMessage(err.message, 'error');
            }
        }
        
        // Enter key to create task
        document.getElementById('taskTitle').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                createTask();
            }
        });
    </script>
</body>
</html>
